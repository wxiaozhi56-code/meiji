<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美迹AI - 登录测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .test-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
        }
        .test-info h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .test-info p {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🧴</div>
            <h1>美迹AI</h1>
            <p class="subtitle">智能客户关系管理助手</p>
        </div>

        <div class="form-group">
            <label>手机号</label>
            <input type="tel" id="phone" placeholder="请输入手机号" value="13800138001">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="123456">
        </div>

        <button class="btn" onclick="handleLogin()">登录</button>

        <div id="result" class="result"></div>

        <div class="test-info">
            <h3>测试账号信息</h3>
            <p>手机号：13800138001</p>
            <p>密码：123456</p>
            <p>门店：美颜美容院</p>
            <p>角色：门店老板</p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            const btn = document.querySelector('.btn');

            if (!phone || !password) {
                showResult('error', '请输入手机号和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const response = await fetch('http://localhost:9091/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ phone, password }),
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showResult('success', `登录成功！欢迎回来，${data.data.user.name}`);
                    console.log('Token:', data.data.token);
                    console.log('User:', data.data.user);
                } else {
                    showResult('error', data.error || '登录失败');
                }
            } catch (error) {
                showResult('error', '网络错误，请检查后端服务是否运行');
                console.error('Login error:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
